# Server config
server.port=8080
spring.application.name=fitmeai-backend

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fitmeai_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory
app.upload.dir=src/main/resources/static/uploads

# JWT config
jwt.secret=${JWT_SECRET:fitmeai-secret-key-change-in-production-min-256-bits-long}
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:4200

# =============================================================================
# FASHN AI - Virtual Try-On ($0.075/essayage, 5-17 secondes)
# =============================================================================
fashn.api.url=https://api.fashn.ai/v1
fashn.api.key=${FASHN_API_KEY}

# =============================================================================
# IDM-VTON / Replicate ($0.024/essayage, 18-20 secondes)
# =============================================================================
replicate.api.url=https://api.replicate.com/v1/predictions
replicate.api.token=${REPLICATE_API_TOKEN}
replicate.model.version=0513734a452173b8173e907e3a59d19a36266e55b48528559432bd21c7d7e985
